name: Update GitHub Profile via PR

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Requirements
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-setuptools git
        
    - name: Run Updater & Create PR
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 使用内置 token
      run: |
        cd ./github_myprofile_updater
        python3 update.py
        
        # 配置 git
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 创建新分支并提交
        BRANCH_NAME="auto-update-profile-${{ github.run_number }}"
        git checkout -b "$BRANCH_NAME"
        git add README.md images/
        
        # 仅当有变更时才创建提交和 PR
        if ! git diff --staged --quiet; then
          git commit -m "chore: auto-update profile [skip ci]"
          git push -u origin "$BRANCH_NAME"
          
          # 创建 Pull Request
          gh pr create \
            --title "chore: auto-update profile" \
            --body "Automated update from GitHub Actions workflow" \
            --base main \
            --head "$BRANCH_NAME"
        else
          echo "No changes to commit"
        fi
