name: Update GitHub Profile

on:
  workflow_dispatch:  # 手动触发
  # schedule:
  #   - cron: '0 0 * * *'  # 可选：每天 UTC 0 点执行

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 关键：授予写入权限
    steps:
    - uses: actions/checkout@v4  # 使用最新版
    
    - name: Install Requirements
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-setuptools git
        
    - name: Run Updater
      env:
        # 将敏感信息通过 env 传递，避免 shell 解析问题
        REMOTE_REPO: "https://${{ github.actor }}:${{ secrets.CLASSIC_GITHUB_API_TOKEN }}@github.com/huitangtang/huitangtang.git"
      run: |
        cd ./github_myprofile_updater
        python3 update.py
        
        git init
        git config --local user.name "${{ github.actor }}"
        git config --local user.email "ee.ht.tang@outlook.com"
        
        git add README.md images/
        git commit -m "chore: auto-update profile [skip ci]"
        
        # 使用环境变量中的 remote_repo
        git push "${REMOTE_REPO}" HEAD:main --force-with-lease  # 更安全的 force 推送
